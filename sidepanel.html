<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gemini Side Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tab-nav">
        <button class="tab-btn active" data-tab="gemini">🤖 Gemini</button>
        <button class="tab-btn" data-tab="todo">✅ Todo</button>
        <button class="tab-btn" data-tab="notes">📝 Notlar</button>
    </div>

    <div id="tab-gemini" class="tab-content active">
        <div class="toolbar">
            <button class="tool-btn" id="btn-summarize" title="Önemli noktalarıyla özetle">Özetle</button>
            <button class="tool-btn" id="btn-yks" title="YKS müfredatına uygun anlat">YKS Tarzı</button>
            <button class="tool-btn" id="btn-code" title="Kodu analiz et ve optimize et">Kod Analizi</button>
            <button class="tool-btn" id="btn-think" title="Araştırmacı gözüyle teknik olarak analiz et">Sen Ne Düşünüyorsun?</button>
        </div>

        <div id="drop-overlay">
            <div class="drop-text">Drop text to analyze with Gemini</div>
        </div>
        <iframe id="geminiFrame" src="" allow="clipboard-read; clipboard-write"></iframe>

        <div class="refresh-container">
            <button id="refreshBtn" title="Refresh Gemini">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="tab-todo" class="tab-content">
        <div class="feature-panel">
            <div class="input-row">
                <input type="text" id="todo-input" placeholder="Yeni görev ekle...">
                <button id="add-todo-btn">Ekle</button>
            </div>
            <ul id="todo-list"></ul>
        </div>
    </div>

    <div id="tab-notes" class="tab-content">
        <div class="feature-panel" style="flex: 1;">
            <textarea id="notes-area" placeholder="Notlarınızı buraya yazın..."></textarea>
            <div class="notes-footer">
                <span id="notes-saved-indicator"></span>
                <button id="clear-notes-btn">Temizle</button>
            </div>
        </div>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
